<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma de Informes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f2;padding:1rem;}
.dash{max-width:1100px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem;padding-top:0.5rem;}
.dash-title{font-size:18px;font-weight:600;color:#1a1a18;}
.period-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.period-row label{font-size:12px;color:#5f5e5a;}
.period-row select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a18;}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;margin-left:8px;}
.sync-ok{background:#EAF3DE;color:#3B6D11;}
.sync-wait{background:#FAEEDA;color:#633806;}
.sync-err{background:#FCEBEB;color:#A32D2D;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.kpi{background:#e8e8e4;border-radius:8px;padding:14px 16px;}
.kpi-label{font-size:11px;color:#5f5e5a;margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:600;}
.c-total{color:#1a1a18;}.c-emit{color:#3B6D11;}.c-pend{color:#5F5E5A;}.c-venc{color:#A32D2D;}
.panel{background:#fff;border:1px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{font-size:10px;font-weight:600;color:#5f5e5a;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid #e0e0e0;text-align:left;white-space:nowrap;background:#fafafa;}
tbody tr{border-bottom:1px solid #f0f0f0;}
tbody tr:nth-child(even){background:#fafafa;}
tbody td{padding:10px 12px;vertical-align:top;}
.grp-row td{padding:6px 12px;}
.grp-label{display:flex;align-items:center;gap:8px;}
.grp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}
.grp-text{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.grp-count{font-size:10px;color:#888;margin-left:auto;}
.inf-name{font-size:12px;font-weight:600;color:#1a1a18;margin-bottom:2px;}
.inf-sub{font-size:11px;color:#888;}
.cat-pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;margin-bottom:4px;font-weight:500;}
.cat-calidad{background:#EEEDFE;color:#3C3489;}
.cat-movimiento{background:#E1F5EE;color:#085041;}
.cat-construccion{background:#FAEEDA;color:#633806;}
.cat-prode{background:#E6F1FB;color:#0C447C;}
.date-wrap{display:flex;flex-direction:column;gap:3px;}
.date-input{font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#1a1a18;width:100%;}
.date-ref{font-size:10px;color:#888;margin-top:2px;}
.resp-cell{display:flex;flex-direction:column;gap:4px;}
.resp-row-wrap{display:flex;align-items:center;gap:4px;}
.resp-sel{font-size:12px;padding:5px 6px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#1a1a18;flex:1;min-width:0;}
.btn-x{font-size:14px;background:none;border:none;cursor:pointer;color:#999;padding:2px 5px;line-height:1;}
.btn-add{font-size:11px;color:#888;background:none;border:1px dashed #ccc;border-radius:6px;padding:4px 8px;cursor:pointer;width:100%;text-align:left;margin-top:2px;}
.st-sel{font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid #ccc;width:100%;background:#fff;color:#1a1a18;}
.st-emitido{background:#EAF3DE;color:#3B6D11;border-color:#97C459;}
.st-pendiente{background:#F5F5F0;color:#5F5E5A;border-color:#ccc;}
.st-vencido{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}
.obs-input{font-size:11px;padding:5px 7px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#1a1a18;width:100%;}
.action-bar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.btn-finalizar{background:#1a1a18;color:#fff;font-size:14px;font-weight:600;padding:10px 28px;border:none;border-radius:8px;cursor:pointer;}
.btn-finalizar:hover{background:#3a3a38;}
.btn-calendar{background:#fff;color:#185FA5;font-size:14px;font-weight:600;padding:10px 22px;border:1.5px solid #185FA5;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;}
.btn-calendar:hover{background:#E6F1FB;}
.btn-calendar svg{width:16px;height:16px;flex-shrink:0;}
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(245,245,242,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loading-spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#1a1a18;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:#5f5e5a;}

@media print {
  @page{size:A4 landscape;margin:15mm 12mm;}
  body{background:#fff !important;padding:0 !important;}
  .action-bar,.sync-badge,.loading-overlay{display:none !important;}
  .period-row{display:none !important;}
  .date-input,.resp-sel,.st-sel,.obs-input,.btn-x,.btn-add{display:none !important;}
  .print-date,.print-resp,.print-st,.print-obs{display:block !important;}
  .dash{max-width:100% !important;}
  .panel{border:1px solid #ccc !important;border-radius:0 !important;}
  .kpi{background:#e8e8e4 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  table{font-size:10px !important;}
  thead th{font-size:9px !important;background:#f0f0ec !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .grp-row td{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cat-pill{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .st-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .st-badge.emit{background:#EAF3DE;color:#3B6D11;}
  .st-badge.pend{background:#F5F5F0;color:#5F5E5A;}
  .st-badge.venc{background:#FCEBEB;color:#A32D2D;}
  .print-header-period{display:block !important;font-size:12px;color:#5f5e5a;margin-top:2px;}
}
.print-date,.print-resp,.print-st,.print-obs,.print-header-period{display:none;}

@media(max-width:600px){
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .dash-title{font-size:16px;}
  table{font-size:11px;}
  tbody td{padding:8px 8px;}
  .action-bar{justify-content:stretch;}
  .btn-finalizar,.btn-calendar{flex:1;justify-content:center;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando datos...</div>
</div>

<div class="dash">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="dash-title">Cronograma de informes</span>
      <span class="print-header-period" id="printPeriod"></span>
      <span class="sync-badge sync-wait" id="syncBadge">Conectando...</span>
    </div>
    <div class="period-row">
      <label>Período</label>
      <select id="monthSel"></select>
      <select id="yearSel"></select>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-calendar" id="btnCalendar">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="2" width="14" height="13" rx="2" stroke="#185FA5" stroke-width="1.5"/>
        <path d="M1 6h14" stroke="#185FA5" stroke-width="1.5"/>
        <path d="M5 1v2M11 1v2" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="4" y="8" width="2" height="2" rx="0.5" fill="#185FA5"/>
        <rect x="7" y="8" width="2" height="2" rx="0.5" fill="#185FA5"/>
        <rect x="4" y="11" width="2" height="2" rx="0.5" fill="#185FA5"/>
        <rect x="7" y="11" width="2" height="2" rx="0.5" fill="#185FA5"/>
        <rect x="10" y="8" width="2" height="2" rx="0.5" fill="#185FA5"/>
      </svg>
      Exportar al calendario
    </button>
    <button class="btn-finalizar" id="btnFinalizar">Finalizar — Generar PDF</button>
  </div>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="panel">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:26%;">Informe</th>
            <th style="width:17%;">Fecha límite</th>
            <th style="width:28%;">Responsable(s)</th>
            <th style="width:15%;">Estado</th>
            <th style="width:14%;">Observación</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var firebaseConfig = {
  databaseURL: "https://cronograma-informes-8c976-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var RESPS = [
  {sigla:"MC", nombre:"Matia Cardozo"},
  {sigla:"JM", nombre:"Jhonatan Medrano"},
  {sigla:"FP", nombre:"Felipe Pinto"},
  {sigla:"AG", nombre:"Alex Garcia"},
  {sigla:"RB", nombre:"Ruben Condori"},
  {sigla:"NA", nombre:"N/A"}
];

var INFORMES = [
  {id:0,  nombre:"Calidad PSLCVQ",                 detalle:"Planta PSLCVQ",        cat:"calidad",      tipo:"penultimo"},
  {id:1,  nombre:"Calidad PSLRGD",                  detalle:"Planta PSLRGD",        cat:"calidad",      tipo:"penultimo"},
  {id:2,  nombre:"Mov. Producto PSLCVQ",            detalle:"Planta PSLCVQ",        cat:"movimiento",   tipo:"habil_fin", off:5},
  {id:3,  nombre:"Mov. Producto PSLRGD",            detalle:"Planta PSLRGD",        cat:"movimiento",   tipo:"habil_fin", off:5},
  {id:4,  nombre:"Mov. Producto PAU",               detalle:"Planta PAU",           cat:"movimiento",   tipo:"habil_fin", off:5},
  {id:5,  nombre:"Mov. Producto GNL",               detalle:"ERS / STGNL / PGNL",   cat:"movimiento",   tipo:"habil_fin", off:5},
  {id:6,  nombre:"Avance Construcción PORCO",       detalle:"Proyecto Porco",       cat:"construccion", tipo:"habil_fin", off:3},
  {id:7,  nombre:"Avance Construcción VALLEGRANDE", detalle:"Proyecto Vallegrande", cat:"construccion", tipo:"habil_fin", off:3},
  {id:8,  nombre:"Avance Construcción CONCEPCIÓN",  detalle:"Proyecto Concepción",  cat:"construccion", tipo:"habil_fin", off:3},
  {id:9,  nombre:"Informe de Balance",              detalle:"PRODE",                cat:"prode",        tipo:"libre"},
  {id:10, nombre:"Informe de Programación PSL",     detalle:"PRODE",                cat:"prode",        tipo:"libre"}
];

var CATS = {
  calidad:      {label:"Calidad",       color:"#7F77DD", pill:"cat-calidad",      grp:"Informes de calidad"},
  movimiento:   {label:"Mov. Producto", color:"#1D9E75", pill:"cat-movimiento",   grp:"Informes de movimiento de producto"},
  construccion: {label:"Construcción",  color:"#BA7517", pill:"cat-construccion", grp:"Informes de avance de construcción"},
  prode:        {label:"PRODE",         color:"#378ADD", pill:"cat-prode",        grp:"Informes PRODE"}
};
var GRPS = ["calidad","movimiento","construccion","prode"];
var defResps = ["MC","MC","MC","MC","FP","JM","FP","FP","FP","NA","NA"];

var ST = {};
for (var i = 0; i < INFORMES.length; i++) {
  ST[INFORMES[i].id] = {resps:[defResps[i]], status:"Pendiente", obs:"", customDate:null};
}

var today = new Date(); today.setHours(0,0,0,0);
var months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var mSel = document.getElementById("monthSel");
var ySel = document.getElementById("yearSel");
var isSaving = false;

for (var mi = 0; mi < months.length; mi++) {
  var mo = document.createElement("option");
  mo.value = mi; mo.textContent = months[mi];
  if (mi === today.getMonth()) mo.selected = true;
  mSel.appendChild(mo);
}
for (var yr = today.getFullYear()-1; yr <= today.getFullYear()+1; yr++) {
  var yo = document.createElement("option");
  yo.value = yr; yo.textContent = yr;
  if (yr === today.getFullYear()) yo.selected = true;
  ySel.appendChild(yo);
}

function getDbKey() {
  return "periodo_"+ySel.value+"_"+String(parseInt(mSel.value)+1).padStart(2,"0");
}
function setSyncBadge(state) {
  var el = document.getElementById("syncBadge");
  if(state==="ok")   {el.className="sync-badge sync-ok";  el.textContent="Sincronizado";}
  if(state==="wait") {el.className="sync-badge sync-wait";el.textContent="Guardando...";}
  if(state==="load") {el.className="sync-badge sync-wait";el.textContent="Cargando...";}
  if(state==="err")  {el.className="sync-badge sync-err"; el.textContent="Sin conexión";}
}
function saveToFirebase() {
  if(isSaving) return;
  isSaving=true; setSyncBadge("wait");
  var key=getDbKey(); var data={};
  for(var id in ST){
    data[id]={resps:ST[id].resps.join(","),status:ST[id].status,obs:ST[id].obs||"",customDate:ST[id].customDate||""};
  }
  db.ref("cronograma/"+key).set(data,function(error){
    isSaving=false;
    if(error){setSyncBadge("err");}else{setSyncBadge("ok");}
  });
}
function loadFromFirebase(callback) {
  setSyncBadge("load");
  var key=getDbKey();
  db.ref("cronograma/"+key).once("value",function(snapshot){
    var data=snapshot.val();
    if(data){
      for(var id in data){
        if(ST[id]!==undefined){
          ST[id].resps=data[id].resps?data[id].resps.split(","):[defResps[id]];
          ST[id].status=data[id].status||"Pendiente";
          ST[id].obs=data[id].obs||"";
          ST[id].customDate=data[id].customDate||null;
        }
      }
    }
    setSyncBadge("ok");
    document.getElementById("loadingOverlay").style.display="none";
    if(callback)callback();
  },function(){setSyncBadge("err");document.getElementById("loadingOverlay").style.display="none";if(callback)callback();});
}
function listenFirebase() {
  var key=getDbKey();
  db.ref("cronograma/"+key).on("value",function(snapshot){
    if(isSaving)return;
    var data=snapshot.val();
    if(data){
      for(var id in data){
        if(ST[id]!==undefined){
          ST[id].resps=data[id].resps?data[id].resps.split(","):[defResps[id]];
          ST[id].status=data[id].status||"Pendiente";
          ST[id].obs=data[id].obs||"";
          ST[id].customDate=data[id].customDate||null;
        }
      }
      render(); setSyncBadge("ok");
    }
  });
}

function isHabil(d){var w=d.getDay();return w!==0&&w!==6;}
function habitDays(y,m){
  var ds=[];var d=new Date(y,m,1);
  while(d.getMonth()===m){if(isHabil(d))ds.push(new Date(d));d.setDate(d.getDate()+1);}
  return ds;
}
function calcDeadline(inf,y,m){
  if(ST[inf.id].customDate) return new Date(ST[inf.id].customDate+"T00:00:00");
  var h=habitDays(y,m); var n=h.length;
  if(inf.tipo==="penultimo") return h[n-2];
  if(inf.tipo==="habil_fin") return h[Math.max(0,n-inf.off)];
  return h[n-1];
}
function refLabel(inf){
  if(ST[inf.id].customDate) return "Fecha personalizada";
  if(inf.tipo==="penultimo") return "Penúltimo día hábil";
  if(inf.tipo==="habil_fin") return inf.off+"° hábil desde fin";
  if(inf.tipo==="libre") return "Seleccionar fecha";
  return "Último día hábil";
}
function toInputVal(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmtDate(d){
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
}
function toICSDate(d){
  return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
}
function respOpts(sel){
  var html="";
  for(var i=0;i<RESPS.length;i++){
    html+="<option value='"+RESPS[i].sigla+"'"+(sel===RESPS[i].sigla?" selected":"")+">"+RESPS[i].nombre+"</option>";
  }
  return html;
}
function getNombres(resps){
  var names=[];
  for(var i=0;i<resps.length;i++){
    for(var j=0;j<RESPS.length;j++){
      if(RESPS[j].sigla===resps[i]){names.push(RESPS[j].nombre);break;}
    }
  }
  return names.join(", ");
}

function generateICS() {
  var y=parseInt(ySel.value); var m=parseInt(mSel.value);
  var periodLabel=months[m]+" "+y;
  var lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Cronograma Informes//ES","CALSCALE:GREGORIAN","METHOD:PUBLISH"];
  var now=new Date();
  var stamp=now.getFullYear()+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0")+"T"+
    String(now.getHours()).padStart(2,"0")+String(now.getMinutes()).padStart(2,"0")+String(now.getSeconds()).padStart(2,"0")+"Z";

  for(var i=0;i<INFORMES.length;i++){
    var inf=INFORMES[i];
    if(inf.tipo==="libre"&&!ST[inf.id].customDate) continue;
    var dl=calcDeadline(inf,y,m);
    if(!dl) continue;
    var dateStr=toICSDate(dl);
    var respNombres=getNombres(ST[inf.id].resps);
    var desc="Responsable: "+respNombres+"\\nEstado: "+ST[inf.id].status+(ST[inf.id].obs?"\\nObs: "+ST[inf.id].obs:"")+"\\nPeríodo: "+periodLabel;
    lines.push("BEGIN:VEVENT");
    lines.push("UID:informe-"+inf.id+"-"+dateStr+"@cronograma");
    lines.push("DTSTAMP:"+stamp);
    lines.push("DTSTART;VALUE=DATE:"+dateStr);
    lines.push("DTEND;VALUE=DATE:"+dateStr);
    lines.push("SUMMARY:"+inf.nombre+" — "+CATS[inf.cat].label);
    lines.push("DESCRIPTION:"+desc);
    lines.push("CATEGORIES:Cronograma Informes");
    lines.push("STATUS:"+(ST[inf.id].status==="Emitido"?"COMPLETED":"NEEDS-ACTION"));
    lines.push("BEGIN:VALARM");
    lines.push("TRIGGER:-P1D");
    lines.push("ACTION:DISPLAY");
    lines.push("DESCRIPTION:Recordatorio: "+inf.nombre+" vence mañana");
    lines.push("END:VALARM");
    lines.push("END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}

function downloadICS() {
  var y=parseInt(ySel.value); var m=parseInt(mSel.value);
  var content=generateICS();
  var isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS||isSafari){
    var dataUri="data:text/calendar;charset=utf-8,"+encodeURIComponent(content);
    window.open(dataUri,"_blank");
  } else {
    var blob=new Blob([content],{type:"text/calendar;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    a.download="cronograma_"+months[m]+"_"+y+".ics";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

function renderKPI(){
  var e=0,p=0,v=0;
  for(var i=0;i<INFORMES.length;i++){
    var s=ST[INFORMES[i].id].status;
    if(s==="Emitido")e++;else if(s==="Vencido")v++;else p++;
  }
  document.getElementById("kpiRow").innerHTML=
    "<div class='kpi'><div class='kpi-label'>Total</div><div class='kpi-val c-total'>"+INFORMES.length+"</div></div>"+
    "<div class='kpi'><div class='kpi-label'>Emitidos</div><div class='kpi-val c-emit'>"+e+"</div></div>"+
    "<div class='kpi'><div class='kpi-label'>Pendientes</div><div class='kpi-val c-pend'>"+p+"</div></div>"+
    "<div class='kpi'><div class='kpi-label'>Vencidos</div><div class='kpi-val c-venc'>"+v+"</div></div>";
}

function getGrpBg(cat){
  var colors={calidad:"#f0eeff",movimiento:"#edf8f3",construccion:"#fdf5e8",prode:"#e8f3fc"};
  return colors[cat]||"#f5f5f2";
}

function render(){
  var y=parseInt(ySel.value); var m=parseInt(mSel.value);
  document.getElementById("printPeriod").textContent="Período: "+months[m]+" "+y;
  var tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  for(var gi=0;gi<GRPS.length;gi++){
    var cat=GRPS[gi];
    var rows=[];
    for(var ii=0;ii<INFORMES.length;ii++){if(INFORMES[ii].cat===cat)rows.push(INFORMES[ii]);}
    var bg=getGrpBg(cat);
    var gr=document.createElement("tr");gr.className="grp-row";
    gr.innerHTML="<td colspan='5' style='background:"+bg+";'><div class='grp-label'>"+
      "<span class='grp-dot' style='background:"+CATS[cat].color+";'></span>"+
      "<span class='grp-text' style='color:"+CATS[cat].color+";'>"+CATS[cat].grp+"</span>"+
      "<span class='grp-count'>"+rows.length+" informe"+(rows.length>1?"s":"")+"</span>"+
      "</div></td>";
    tbody.appendChild(gr);

    for(var ri=0;ri<rows.length;ri++){
      var inf=rows[ri];
      var dl=null; var dateVal="";
      if(inf.tipo!=="libre"||ST[inf.id].customDate){
        dl=calcDeadline(inf,y,m); dateVal=toInputVal(dl);
      }
      var st=ST[inf.id].status;
      var stClass=st==="Emitido"?"st-emitido":st==="Vencido"?"st-vencido":"st-pendiente";
      var stBadgeClass=st==="Emitido"?"emit":st==="Vencido"?"venc":"pend";
      var respHTML="";
      for(var rri=0;rri<ST[inf.id].resps.length;rri++){
        respHTML+="<div class='resp-row-wrap'>"+
          "<select class='resp-sel' data-id='"+inf.id+"' data-idx='"+rri+"'>"+respOpts(ST[inf.id].resps[rri])+"</select>"+
          (ST[inf.id].resps.length>1?"<button class='btn-x' data-id='"+inf.id+"' data-idx='"+rri+"'>×</button>":"")+
          "</div>";
      }
      var canAdd=ST[inf.id].resps.length<RESPS.length;
      var obsVal=ST[inf.id].obs||"";
      var printDateTxt=dl?fmtDate(dl):"—";
      var tr=document.createElement("tr");
      tr.innerHTML=
        "<td><span class='cat-pill "+CATS[cat].pill+"'>"+CATS[cat].label+"</span>"+
        "<div class='inf-name'>"+inf.nombre+"</div><div class='inf-sub'>"+inf.detalle+"</div></td>"+
        "<td><div class='date-wrap'>"+
          "<input type='date' class='date-input' data-id='"+inf.id+"' value='"+dateVal+"'>"+
          "<span class='print-date'>"+printDateTxt+"</span>"+
          "<span class='date-ref'>"+refLabel(inf)+"</span></div></td>"+
        "<td><div class='resp-cell'>"+respHTML+
          (canAdd?"<button class='btn-add' data-id='"+inf.id+"'>+ agregar responsable</button>":"")+
          "<span class='print-resp'>"+getNombres(ST[inf.id].resps)+"</span></div></td>"+
        "<td><select class='st-sel "+stClass+"' data-id='"+inf.id+"'>"+
          "<option"+(st==="Pendiente"?" selected":"")+">Pendiente</option>"+
          "<option"+(st==="Emitido"?" selected":"")+">Emitido</option>"+
          "<option"+(st==="Vencido"?" selected":"")+">Vencido</option></select>"+
          "<span class='print-st st-badge "+stBadgeClass+"'>"+st+"</span></td>"+
        "<td><input class='obs-input' type='text' data-id='"+inf.id+"' placeholder='—' value='"+obsVal+"' maxlength='60'>"+
          "<span class='print-obs'>"+obsVal+"</span></td>";
      tbody.appendChild(tr);
    }
  }

  tbody.querySelectorAll(".date-input").forEach(function(el){
    el.addEventListener("change",function(e){ST[e.target.dataset.id].customDate=e.target.value||null;render();saveToFirebase();});
  });
  tbody.querySelectorAll(".resp-sel").forEach(function(el){
    el.addEventListener("change",function(e){ST[e.target.dataset.id].resps[parseInt(e.target.dataset.idx)]=e.target.value;render();saveToFirebase();});
  });
  tbody.querySelectorAll(".btn-x").forEach(function(el){
    el.addEventListener("click",function(e){var id=e.target.dataset.id;ST[id].resps.splice(parseInt(e.target.dataset.idx),1);render();saveToFirebase();});
  });
  tbody.querySelectorAll(".btn-add").forEach(function(el){
    el.addEventListener("click",function(e){
      var id=e.target.dataset.id;var used=ST[id].resps;
      for(var ri=0;ri<RESPS.length;ri++){if(used.indexOf(RESPS[ri].sigla)===-1){ST[id].resps.push(RESPS[ri].sigla);break;}}
      render();saveToFirebase();
    });
  });
  tbody.querySelectorAll(".st-sel").forEach(function(el){
    el.addEventListener("change",function(e){
      var id=e.target.dataset.id;ST[id].status=e.target.value;
      e.target.className="st-sel "+(e.target.value==="Emitido"?"st-emitido":e.target.value==="Vencido"?"st-vencido":"st-pendiente");
      var badge=e.target.parentNode.querySelector(".print-st");
      if(badge){badge.className="print-st st-badge "+(e.target.value==="Emitido"?"emit":e.target.value==="Vencido"?"venc":"pend");badge.textContent=e.target.value;}
      renderKPI();saveToFirebase();
    });
  });
  tbody.querySelectorAll(".obs-input").forEach(function(el){
    el.addEventListener("input",function(e){ST[e.target.dataset.id].obs=e.target.value;var span=e.target.parentNode.querySelector(".print-obs");if(span)span.textContent=e.target.value;});
    el.addEventListener("change",function(){saveToFirebase();});
  });
  renderKPI();
}

function changePeriod(){
  for(var i=0;i<INFORMES.length;i++){ST[INFORMES[i].id]={resps:[defResps[i]],status:"Pendiente",obs:"",customDate:null};}
  db.ref("cronograma/"+getDbKey()).off();
  document.getElementById("loadingOverlay").style.display="flex";
  loadFromFirebase(function(){render();listenFirebase();});
}

document.getElementById("btnFinalizar").addEventListener("click",function(){window.print();});
document.getElementById("btnCalendar").addEventListener("click",function(){downloadICS();});
mSel.addEventListener("change",changePeriod);
ySel.addEventListener("change",changePeriod);

loadFromFirebase(function(){render();listenFirebase();});
</script>
</body>
</html>
